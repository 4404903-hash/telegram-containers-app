<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AutoBazar Game</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <section id="startScreen" class="screen active start">
    <div class="logo">🚘</div>
    <p class="eyebrow">TELEGRAM MINI APP</p>
    <h1>AutoBazar</h1>
    <p>Онлайн-автобазар у вигляді гри</p>
    <button id="buyBtn" class="primary">Купити машину</button>
    <button id="sellBtn" class="secondary">Продати машину</button>
  </section>

  <section id="sellScreen" class="screen">
    <header><button class="back">←</button><h2>Продати машину</h2></header>
    <form id="sellForm" class="panel">
      <input name="brand" placeholder="Марка: BMW" required>
      <input name="model" placeholder="Модель: X5" required>
      <input name="year" type="number" min="1950" max="2030" placeholder="Рік" required>
      <input name="price" type="number" min="1" placeholder="Ціна, $" required>
      <textarea name="description" maxlength="700" placeholder="Опис машини"></textarea>
      <div id="zoneHint">Територія визначиться за ціною</div>
      <button class="primary" type="submit">Виставити на площадку</button>
    </form>
  </section>

  <section id="marketScreen" class="screen">
    <header class="market-header">
      <button id="exitMarket">←</button>
      <div><small id="modeText"></small><strong id="zoneTitle"></strong></div>
      <button id="inboxBtn">✉️<b id="badge" class="hidden">0</b></button>
    </header>
    <div id="tabs" class="tabs"></div>
    <div id="world" class="world">
      <div class="road v"></div><div class="road h"></div>
      <div id="grid" class="grid"></div>
      <div id="player" class="player"><span>🧍</span><small id="playerName">Я</small></div>
    </div>
    <div class="controls">
      <button data-move="up">▲</button>
      <div><button data-move="left">◀</button><button data-move="down">▼</button><button data-move="right">▶</button></div>
    </div>
  </section>

  <section id="inboxScreen" class="screen">
    <header><button id="backMarket">←</button><h2>Повідомлення</h2></header>
    <div id="messages"></div>
  </section>

  <div id="modal" class="modal hidden">
    <div class="backdrop close-modal"></div>
    <article>
      <button class="close close-modal">×</button>
      <div class="big-car">🚗</div>
      <p id="mZone" class="eyebrow"></p>
      <h2 id="mTitle"></h2>
      <div class="details">
        <span>Рік<b id="mYear"></b></span>
        <span>Ціна<b id="mPrice"></b></span>
        <span>Продавець<b id="mSeller"></b></span>
        <span>Статус<b id="mStatus"></b></span>
      </div>
      <p id="mDescription"></p>
      <form id="messageForm">
        <textarea id="messageText" placeholder="Напиши продавцю"></textarea>
        <button class="primary">Надіслати</button>
      </form>
      <button id="removeBtn" class="danger hidden">Зняти моє оголошення</button>
    </article>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
