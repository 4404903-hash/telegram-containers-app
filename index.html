<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контейнери Mini App</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎁 Відкриття Контейнерів</h1>
    <p>Вітаємо, <span id="username">Гравець</span>!</p>
    
    <button class="btn" id="openBtn">ВІДКРИТИ КОНТЕЙНЕР 📦</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        document.getElementById('openBtn').addEventListener('click', () => {
            const containerNum = Math.floor(Math.random() * 100) + 1;
            const isWin = Math.random() < 0.05; // 5% шанс

            let message = `Відкрито контейнер №${containerNum}\n`;
            message += isWin ? "🎉 Ви виграли приз!" : "😔 Без виграшу.";

            // Використовуємо універсальний метод, який працює скрізь
            tg.sendObject({
                type: "game_result",
                text: message
            });
            
            tg.close(); // Закриваємо додаток
        });
    </script>
</body>
</html>
