<!doctype html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Container Game</title><script src="https://telegram.org/js/telegram-web-app.js"></script><link rel="stylesheet" href="style.css"></head><body><div class="app"><header><div><small>TELEGRAM MINI GAME</small><h1>Container Game</h1></div><div id="user">👤 Гравець</div></header><section class="hero"><div><h2>100 контейнерів</h2><p>Відкривай контейнери та збирай віртуальні предмети.</p></div><button id="reset">Скинути</button></section><section class="stats"><div>Відкрито <b><span id="opened">0</span>/100</b></div><div>Предметів <b id="count">0</b></div><div>Найкраща рідкість <b id="best">—</b></div></section><nav><button class="tab active" data-panel="boxes">Контейнери</button><button class="tab" data-panel="inventory">Інвентар <span id="badge">0</span></button></nav><main><section id="boxes" class="panel active"><div class="heading"><h3>Обери контейнер</h3><button id="random">Відкрити випадковий</button></div><div id="grid" class="grid"></div></section><section id="inventory" class="panel"><div id="empty" class="empty">🎒<h3>Інвентар порожній</h3><p>Відкрий перший контейнер.</p></div><div id="items" class="items"></div></section></main></div><div id="modal" class="modal"><div class="backdrop"></div><div class="card"><button id="close" class="close">×</button><div id="loading" class="loading"><div class="box">📦</div><p>Відкриваємо...</p></div><div id="reward" class="reward hidden"><div id="rewardIcon" class="rewardIcon">💎</div><span id="rarity"></span><h2 id="rewardName"></h2><p id="desc"></p><button id="collect">Забрати предмет</button></div></div></div><div id="toast" class="toast"></div><script src="script.js"></script></body></html>
